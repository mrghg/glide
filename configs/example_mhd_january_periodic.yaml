# Example GLIDE multi-release config: Mace Head (MHD, Ireland), hourly footprints
# for January 2024, each backward-integrated 30 days.
#
# This is the M5-stage-5+ analog of configs/example_mhd_january.yaml: instead of
# one release, it produces 720 hourly footprints (30 days × 24 hours) in a single
# Zarr indexed by release_time. Cell-for-cell aligned with the FLEXPART reference
# fixture data/FLEXPART/FLEXPART_MHD_test_202401.nc — the 96-footprint subset
# there can be compared directly to the matching release_time slices of this run.
#
# Memory note: the gridder allocates one in-memory tensor of shape
# (n_releases, n_time_bins, n_z, n_y, n_x) × float32 (4 B) and holds it for the
# whole run — there are no streaming per-batch writes yet (M5 follow-up). With
# the values below: 720 × 1 × 3 × 293 × 391 × 4 ≈ 990 MB.
#
# Cranking n_time_bins is expensive — each extra time-ago bin multiplies the
# tensor by that factor. The FLEXPART comparison workflow integrates over
# time-ago (see `to_stilt_surface_footprint` in lpdm.comparison), so a single
# bin (`n_time_bins: 1`) reproduces what FLEXPART stores; bump it only if you
# want a time-resolved view AND have the RAM (e.g. 24 hourly bins ≈ 24 GB,
# 720 hourly bins ≈ 712 GB).
#
# Run with:
#   .venv/bin/python -m lpdm.main --config configs/example_mhd_january_periodic.yaml
#
# All paths are relative to the repo root unless otherwise noted.

io:
  # 30-day backward integration starting 2024-01-01 needs both Dec 2023 and Jan
  # 2024 met. Download with scripts/download_sample_cube.py --domain EUROPE.
  zarr_store: ~/data/arco-era5/EUROPE_*.zarr
  output_uri: outputs/mhd-202401-hourly

simulation:
  # `start_time` is the start of the simulation window. For periodic_point it
  # only affects met-coverage preflight (the actual release schedule below
  # carries its own start_time). Setting it equal to the first release_time
  # keeps the preflight check tight.
  start_time: 2024-01-01T00:00:00Z
  length_seconds: 2592000              # 30 days backward integration per release
  dt_seconds: 60                       # 1 min: appropriate for Hanna near the surface
  device: auto                         # auto | cpu | cuda | mps

release:
  kind: periodic_point
  point:
    lon: -9.9046
    lat: 53.3267
    alt_agl_m: 10.0                    # Mace Head inlet height
  start_time: 2024-01-01T00:00:00Z     # first release window start (UTC)
  period_seconds: 3600                 # one release per hour
  n_releases: 720                      # 30 days × 24 hours = 720 releases
  duration_seconds: 3600               # 1 h release window per release
  n_particles_per_release: 2000
  seed: 42                             # per-release seeds derive as 42 + release_idx

turbulence:
  scheme: hanna_1982

# Output footprint grid: aligned cell-for-cell with the FLEXPART reference fixture.
# Bounds are *outer cell edges*; n_x equal cells fill the interval.
output_grid:
  lon_bounds: [-98.076, 39.556]
  lat_bounds: [10.612, 79.174]
  n_x: 391
  n_y: 293
  z_edges_m: [0.0, 40.0, 1000.0, 5000.0]   # bottom bin matches FLEXPART surface layer
  n_time_bins: 1                           # FLEXPART comparison uses time-integrated footprints

met_domain:
  lon_bounds: [-100.0, 40.0]
  lat_bounds: [10.0, 80.0]
  alt_max_m: 15000.0

# Batch knob: how many releases to integrate per engine pass. Memory scales as
# max_releases_per_batch × n_particles_per_release × per-particle state. At 24 ×
# 2000 = 48k particles in flight, the per-batch tensor footprint is well under
# 1 GB. Met-cache carry-over between batches saves re-fetching adjacent hours.
batch:
  max_releases_per_batch: 24            # one calendar day per batch

memory:
  met_cache_max_hours: 2
  log_every_steps: 100
  gc_every_steps: 50
  guard_check_every_steps: 10
  guard_max_rss_gib: null
  guard_max_device_allocated_gib: null
  guard_max_device_reserved_gib: null
