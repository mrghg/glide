# Example GLIDE run config: Mace Head (MHD, Ireland), 1 Jan 2024, 24 h backward.
#
# This config is intentionally aligned with the bundled FLEXPART reference fixture
# data/FLEXPART/FLEXPART_MHD_test_202401.nc so footprints can be compared cell-for-cell
# without regridding. See VALIDATION.md for the comparison workflow.
#
# All paths are relative to the repo root unless otherwise noted.

io:
  # 30-day backward integration from 2024-01-01 needs both Dec 2023 and Jan 2024
  # met. Download with scripts/download_sample_cube.py --domain EUROPE --year-month
  # 202312 / 202401. The glob expands locally; for gs:// URIs use an explicit list:
  #   zarr_store:
  #     - gs://bucket/EUROPE_202312.zarr
  #     - gs://bucket/EUROPE_202401.zarr
  zarr_store: ~/data/arco-era5/EUROPE_*.zarr
  output_uri: outputs/comparison-mhd-202401-day01

simulation:
  start_time: 2024-01-01T00:00:00Z   # release window start (UTC)
  length_seconds: 86400              # 24 h backward integration from release end
  dt_seconds: 60                     # 1 min: appropriate for Hanna near the surface
  device: auto                       # auto | cpu | cuda | mps

release:
  kind: point
  lon: -9.9046
  lat: 53.3267
  alt_agl_m: 10.0                    # Mace Head inlet height
  duration_seconds: 3600             # 1 h release window
  n_particles: 10000
  seed: 42

turbulence:
  scheme: hanna_1982

# Output footprint grid: matches the FLEXPART reference grid cell-for-cell.
# Bounds are *outer cell edges* (gridder treats lon_bounds[0]/[1] as the outermost
# edges, then n_x equal cells fill the interval). FLEXPART file stores cell
# centres at lon ∈ [-97.900, 39.380] with dlon ≈ 0.352, so outer edges are
# [-98.076, 39.556]. Same logic for latitude (dlat ≈ 0.234).
output_grid:
  lon_bounds: [-98.076, 39.556]
  lat_bounds: [10.612, 79.174]
  n_x: 391
  n_y: 293
  z_edges_m: [0.0, 40.0, 1000.0, 5000.0]   # bottom bin matches FLEXPART surface layer
  n_time_bins: 24                          # 24 hourly bins back from release end

# Met domain: cap on what we load from the Zarr store. Slightly wider than the
# output grid so particles can drift over edges without truncating their wind
# field. alt_max_m bounds the vertical fetch (z_min is implicitly 0 m AGL).
met_domain:
  lon_bounds: [-100.0, 40.0]
  lat_bounds: [10.0, 80.0]
  alt_max_m: 15000.0

memory:
  met_cache_max_hours: 2
  log_every_steps: 100
  gc_every_steps: 50
  guard_check_every_steps: 10
  # Set these to abort early if a run blows past the GiB envelope you allocated.
  guard_max_rss_gib: null
  guard_max_device_allocated_gib: null
  guard_max_device_reserved_gib: null
